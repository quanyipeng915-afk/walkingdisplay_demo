<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        body {
            font-family: 'Jersey 25', 'Pixelify Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;

        .app-container {

        .back-btn {

        .user-name {

            -webkit-text-fill-color: transparent;

        .ranking-stat {

        }

            position: absolute;
            left: 12px;
            top: 12px;
        }

        .rank-card-avatar {

        .rank-card-avatar img {

        .rank-card-name {

            font-size: 20px;
            font-family: 'Pixelify Sans', sans-serif;
            font-weight: 700;
            background: #FFD54F;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        }

        .rank-card.second .rank-card-name {
            background: #1E2939;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

        }

        .rank-card.third .rank-card-name {
            background: #1E2939;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            font-size: 12px;
        }

        .rank-card-steps {
            width: 38px;
            height: 15.99px;
            position: absolute;
            left: 26.43px;
            top: 120px;
            font-size: 12px;
            font-family: 'Pixelify Sans', sans-serif;
            font-weight: 400;
            background: #4A5565;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .rank-card.third .rank-card-steps {
            left: 26.56px;
            top: 109.99px;
        }

        /* User Avatar Image */
        .user-avatar-img {
            width: 76px;
            height: 85px;
            position: absolute;
            left: 21px;
            top: 48px;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.25);
        }

        /* Ranking Items */
        .ranking-item {
            width: 370.01px;
            height: 79.98px;
            position: absolute;
            background: white;
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.10);
            outline: 1px black solid;
            outline-offset: -1px;
            display: flex;
            align-items: center;
        }

        .ranking-item.user {
            background: #43D1CA;
        }

        .ranking-item:nth-child(4) {
            top: 199.70px;
        }

        .ranking-item:nth-child(5) {
            top: 291.68px;
        }

        .ranking-item:nth-child(6) {
            top: 383.67px;
        }

        .ranking-item:nth-child(7) {
            top: 476.70px;
        }

        .rank-number {
            width: 39.99px;
            height: 39.99px;
            margin-left: 15.99px;
            background: #F3F4F6;
            box-shadow: 0px 1px 4px rgba(0, 0, 0, 0.08), 2px 2px 0px rgba(0, 0, 0, 0.10);

            align-items: center;
            justify-content: center;

            font-family: 'Pixelify Sans', sans-serif;

            background-clip: text;
        }

        .ranking-item.user .rank-number {
            background: rgba(255, 255, 255, 0.90);
            -webkit-text-fill-color: transparent;
        }

        .user-avatar-small {
            margin-left: 7.99px;
            width: 48px;
            height: 48px;
        }

        .user-details-ranking {
            margin-left: 15.99px;
            height: 35.98px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .user-name-ranking {
            font-size: 14px;
            font-family: 'Pixelify Sans', sans-serif;
            font-weight: 700;
            background: #1E2939;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ranking-item.user .user-name-ranking {
            background: white;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-level-ranking {
            font-size: 12px;
            font-family: 'Pixelify Sans', sans-serif;
            font-weight: 400;
            background: #6A7282;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ranking-item.user .user-level-ranking {
            background: rgba(255, 255, 255, 0.90);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-steps {
            position: absolute;
            right: 16.99px;
            top: 20px;
            height: 39.99px;
            display: flex;
            flex-direction: column;

        }

        .steps-count {

        }

        .ranking-item.user .steps-label {

        .trophy-icon {

            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                min-height: 100dvh;
                overflow-y: auto;
            }

            .app-container {
                width: 100vw;
                height: 874px;
                min-height: 874px;
                max-width: none;
                max-height: none;
                margin: 0 auto;
            }
        }

</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="back-section">
                <div class="back-btn" onclick="goBack()">
                    <img src="./assets/CodeBubbyAssets/5_1679/1.svg" alt="Back">
                </div>
                <div class="title">RANKING</div>
            </div>
            <div class="ranking-badge">
                <img src="./assets/CodeBubbyAssets/5_1679/2.svg" alt="Trophy">
                <div class="ranking-text">NO.4</div>
            </div>
        </div>

        <!-- User Card -->
        <div class="user-card">
            <div class="user-info">
                <div class="user-avatar">
                    <img src="./assets/CodeBubbyAssets/5_1679/3.svg" alt="User Avatar">
                    <div class="star-badge">
                        <span>⭐</span>
                    </div>
                </div>
                <div class="user-details">
                    <div class="user-name">
                        <span class="user-name-main">EMMA</span>
                        <span class="user-name-you">(YOU)</span>
                    </div>
                    <div class="user-level">LEVEL 12 Guardians</div>
                </div>
            </div>
            <div class="stats-bar">
                <div class="steps-stat">
                    <div class="steps-icon">👟</div>
                    <div class="steps-value">12,450</div>
                </div>
                <div class="ranking-stat">
                    <img src="./assets/CodeBubbyAssets/5_1679/4.svg" alt="Ranking Icon">
                    <div class="ranking-value">NO.4</div>
                </div>
            </div>
            <img class="user-avatar-img" src="./assets/CodeBubbyAssets/5_1679/3.png" alt="User Full Avatar">
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active">
                <img src="./assets/CodeBubbyAssets/5_1679/5.svg" alt="Ranking Icon">
                <div class="tab-text">RANKING LIST</div>
            </div>
            <div class="tab" onclick="switchToFriendList()">
                <img src="./assets/CodeBubbyAssets/5_1679/6.svg" alt="Friend Icon">
                <div class="tab-text">FRIEND LIST</div>
            </div>
        </div>

        <!-- Ranking List -->
        <div class="ranking-list">
            <!-- Top 3 -->
            <div class="top-3-container">
                <!-- NO.2 MIKEY -->
                <div class="rank-card second">
                    <div class="rank-card-content">
                        <div class="rank-card-avatar">
                            <img src="./assets/CodeBubbyAssets/5_1679/3.png" alt="MIKEY">
                        </div>
                        <div class="rank-card-name">NO.2 MIKEY</div>
                        <div class="rank-card-steps">13,850</div>
                    </div>
                </div>
                
                <!-- NO.1 AMY -->
                <div class="rank-card first">
                    <div class="rank-card-content">
                        <div class="rank-card-avatar">
                            <img src="./assets/CodeBubbyAssets/5_1679/1.png" alt="AMY">
                        </div>
                        <div class="rank-card-name">NO.1 AMY</div>
                        <div class="rank-card-steps">14,100</div>
                    </div>
                </div>
                
                <!-- NO.3 CICI -->
                <div class="rank-card third">
                    <div class="rank-card-content">
                        <div class="rank-card-avatar">
                            <img src="./assets/CodeBubbyAssets/5_1679/2.png" alt="CICI">
                        </div>
                        <div class="rank-card-name">NO.3 CICI</div>
                        <div class="rank-card-steps">15,230</div>
                    </div>
                </div>
            </div>

            <!-- Ranking Items -->
            <!-- NO.4 EMMA (YOU) -->
            <div class="ranking-item user">
                <div class="rank-number">4</div>
                <div class="user-avatar-small">
                    <img src="./assets/CodeBubbyAssets/5_1679/7.svg" alt="EMMA">
                </div>
                <div class="user-details-ranking">
                    <div class="user-name-ranking">EMMA (YOU)</div>
                    <div class="user-level-ranking">LEVEL 12</div>
                </div>
                <div class="user-steps">
                    <div class="steps-count">12,450</div>
                    <div class="steps-label">Steps</div>
                </div>
                <div class="trophy-icon"></div>
            </div>

            <!-- NO.5 LIMA -->
            <div class="ranking-item">
                <div class="rank-number">5</div>
                <div class="user-avatar-small">
                    <img src="./assets/CodeBubbyAssets/5_1679/8.svg" alt="LIMA">
                </div>
                <div class="user-details-ranking">
                    <div class="user-name-ranking">LIMA</div>
                    <div class="user-level-ranking">LEVEL 11</div>
                </div>
                <div class="user-steps">
                    <div class="steps-count">11,200</div>
                    <div class="steps-label">Steps</div>
                </div>
            </div>

            <!-- NO.6 JOHN -->
            <div class="ranking-item">
                <div class="rank-number">6</div>
                <div class="user-avatar-small">
                    <img src="./assets/CodeBubbyAssets/5_1679/9.svg" alt="JOHN">
                </div>
                <div class="user-details-ranking">
                    <div class="user-name-ranking">JOHN</div>
                    <div class="user-level-ranking">LEVEL 12</div>
                </div>
                <div class="user-steps">
                    <div class="steps-count">9,800</div>
                    <div class="steps-label">Steps</div>
                </div>
            </div>

            <!-- NO.7 HANS -->
            <div class="ranking-item">
                <div class="rank-number">7</div>
                <div class="user-avatar-small">
                    <img src="./assets/CodeBubbyAssets/5_1679/10.svg" alt="HANS">
                </div>
                <div class="user-details-ranking">
                    <div class="user-name-ranking">HANS</div>
                    <div class="user-level-ranking">LEVEL 11</div>
                </div>
                <div class="user-steps">
                    <div class="steps-count">11,200</div>
                    <div class="steps-label">Steps</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        function switchToFriendList() {
            // For now, just show an alert
            // In a real app, this would switch to friend list view
            alert('Friend list feature coming soon!');
        }

        // Simulate step count updates
        let currentSteps = 12450;
        function updateSteps() {
            currentSteps += Math.floor(Math.random() * 50) + 10;
            document.querySelector('.steps-value').textContent = currentSteps.toLocaleString();
            document.querySelectorAll('.steps-count')[0].textContent = currentSteps.toLocaleString();
        }

        // Update every 3 seconds (demo)
        setInterval(updateSteps, 3000);
    </script>
</body>
</html>
