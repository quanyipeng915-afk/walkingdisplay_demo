<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma Design Implementation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Pixelify Sans', cursive;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app-container {
            width: 402px;
            height: 874px;
            position: relative;
            background: linear-gradient(180deg, #DDF7FA 0%, #DDF7FA 100%), white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            border-radius: 40px;
            overflow: hidden;
            margin: 20px;
        }
        
        /* 顶部区域 */
        .header {
            width: 370px;
            height: 60px;
            position: absolute;
            left: 16px;
            top: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background: white;
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
        }
        
        .title {
            font-size: 24px;
            font-family: 'Pixelify Sans', cursive;
            font-weight: 700;
            color: #4A5565;
        }
        
        /* 内容区域 */
        .content-area {
            position: absolute;
            left: 16px;
            right: 16px;
            top: 90px;
            bottom: 16px;
            background: white;
            border-radius: 4px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
            padding: 20px;
            overflow-y: auto;
        }
        
        /* 占位内容 */
        .placeholder-section {
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 18px;
            font-family: 'Pixelify Sans', cursive;
            font-weight: 700;
            color: #1E2939;
            margin-bottom: 12px;
        }
        
        .placeholder-card {
            background: #F8F9FA;
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 12px;
            border: 2px dashed #E9ECEF;
            text-align: center;
            color: #6C757D;
            font-family: 'Jersey 25', cursive;
        }
        
        .button {
            width: 100%;
            height: 48px;
            background: #FFD54F;
            border-radius: 4px;
            border: none;
            font-size: 16px;
            font-family: 'Pixelify Sans', cursive;
            font-weight: 700;
            color: white;
            text-shadow: 0px 1px 0px rgba(0, 0, 0, 0.25);
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.10), 4px 4px 0px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        /* Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Jersey+25&family=Pixelify+Sans:wght@400;500;700&display=swap');
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 顶部标题栏 -->
        <div class="header">
            <div class="back-btn" onclick="goBack()">
                ←
            </div>
            <div class="title">Design Page</div>
            <div style="width: 40px;"></div> <!-- 平衡布局 -->
        </div>
        
        <!-- 主要内容区域 -->
        <div class="content-area">
            <div class="placeholder-section">
                <div class="section-title">请描述 Figma 设计</div>
                <div class="placeholder-card">
                    这里可以放置你 Figma 设计中的主要内容
                </div>
            </div>
            
            <div class="placeholder-section">
                <div class="section-title">设计元素</div>
                <div class="placeholder-card">
                    卡片、按钮、列表等组件
                </div>
                <div class="placeholder-card">
                    图片、图标等视觉元素
                </div>
            </div>
            
            <div class="placeholder-section">
                <button class="button" onclick="implementDesign()">
                    IMPLEMENT DESIGN
                </button>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            console.log('返回上一页');
            // 根据需要修改返回逻辑
            window.history.back();
        }
        
        function implementDesign() {
            console.log('开始实现设计');
            // 这里可以添加具体的实现逻辑
        }
        
        // ESC 键返回
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                goBack();
            }
        });
    </script>
</body>
</html>
