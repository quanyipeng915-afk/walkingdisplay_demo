<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pixelify Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 402px;
            height: 874px;
            position: relative;
            background: linear-gradient(0deg, #DDF7FA 0%, #DDF7FA 100%), white;
            overflow: hidden;
        }

        /* 顶部标题 */
        .header {
            width: 370.01px;
            height: 55.98px;
            position: absolute;
            left: 15.99px;
            top: 15.99px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-section {
            width: 97.98px;
            height: 55.98px;
            position: relative;
        }

        .main-title {
            width: 248px;
            height: 40px;
            position: absolute;
            left: 49.01px;
            top: 2.01px;
            font-size: 30px;
            font-family: 'Pixelify Sans', cursive;
            font-weight: 700;
            letter-spacing: 1.27px;
            background: linear-gradient(180deg, #4A5565 0%, #4A5565 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-btn {
            width: 49px;
            height: 55px;
            position: absolute;
            left: 0.01px;
            top: 0.01px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        .ranking-badge {
            width: 87px;
            height: 40px;
            position: absolute;
            left: 283.01px;
            top: 0px;
            background: linear-gradient(180deg, #FFD54F 0%, #FFCA28 100%);
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.10), 4px 4px 0px rgba(0, 0, 0, 0.15);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 16px;
        }

        .ranking-text {
            font-size: 16px;
            font-family: 'Pixelify Sans', cursive;
            font-weight: 700;
            color: white;
            text-shadow: 0px 1px 0px rgba(0, 0, 0, 0.25);
        }

        /* 用户信息卡片 */
        .user-card {
            width: 370.01px;
            height: 175.35px;
            position: absolute;
            left: 15.99px;
            top: 87.96px;
            background: white;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
            outline: 1.20px black solid;
            outline-offset: -1.20px;
            backdrop-filter: blur(0px);
            border-radius: 8px;
        }

        .user-info {
            width: 330.02px;
            height: 64px;
            position: absolute;
            left: 20px;
            top: 20px;
            display: flex;
            align-items: center;
            gap: 15.99px;
        }

        .user-avatar {
            width: 64px;
            height: 64px;
            position: relative;
        }

        .avatar-img {
            width: 64px;
            height: 64px;
            position: absolute;
            left: 0px;
            top: 0px;
        }

        .level-badge {
            width: 24px;
            height: 24px;
            position: absolute;
            left: 43.99px;
            top: 43.99px;
            background: #FFD54F;
            box-shadow: 0px 1px 4px rgba(0, 0, 0, 0.08), 2px 2px 0px rgba(0, 0, 0, 0.10);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-family: 'Pixelify Sans', cursive;
            font-weight: 400;
        }

        .user-details {
            width: 250.02px;
            height: 43.99px;
            position: relative;
        }

        .user-name {
            font-size: 20px;
            font-family: 'Pixelify Sans', cursive;
            font-weight: 500;
            background: linear-gradient(180deg, #1E2939 0%, #1E2939 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .user-name .you-tag {
            background: linear-gradient(180deg, #969696 0%, #969696 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-level {
            font-size: 16px;
            font-family: 'Jersey 20', cursive;
            font-weight: 400;
            background: linear-gradient(180deg, #6A7282 0%, #6A7282 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-bar {
            width: 330.02px;
            height: 55.37px;
            position: absolute;
            left: 20px;
            top: 99.99px;
            background: linear-gradient(90deg, rgba(255, 213, 79, 0.20) 0%, rgba(255, 202, 40, 0.20) 100%);
            border-radius: 16px;
            outline: 1.69px rgba(0, 0, 0, 0.10) solid;
            outline-offset: -1.69px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-icon {
            width: 20.27px;
            height: 27.99px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .stat-value {
            font-size: 18px;
            font-family: 'Pixelify Sans', cursive;
            font-weight: 700;
            background: linear-gradient(180deg, #364153 0%, #364153 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ranking-stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ranking-stat-icon {
            width: 24px;
            height: 24px;
        }

        /* 标签切换 */
        .tabs {
            width: 370.01px;
            height: 48px;
            position: absolute;
            left: 15.99px;
            top: 279.31px;
            display: flex;
            gap: 12px;
        }

        .tab {
            width: 179.01px;
            height: 48px;
            background: white;
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.10);
            outline: 1px black solid;
            outline-offset: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            font-family: 'Pixelify Sans', cursive;
            font-weight: 700;
        }

        .tab.active {
            background: #FFD54F;
            color: white;
            text-shadow: 0px 1px 0px rgba(0, 0, 0, 0.25);
        }

        .tab:not(.active) {
            background: linear-gradient(180deg, #4A5565 0%, #4A5565 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tab:hover {
            transform: translateY(-2px);
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
        }

        /* 好友列表 */
        .friend-list {
            width: 370.01px;
            height: 527.87px;
            position: absolute;
            left: 15.99px;
            top: 343.30px;
            overflow-y: auto;
        }

        .friend-item {
            width: 370.01px;
            height: 79.98px;
            position: relative;
            margin-bottom: 12px;
            background: white;
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.10);
            outline: 1px black solid;
            outline-offset: -1px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            transition: all 0.2s ease;
        }

        .friend-item:nth-child(odd) {
            background: #FFF6D9;
        }

        .user-avatar-small {
            width: 48px;
            height: 48px;
            margin-right: 15.99px;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0px 1px 4px rgba(0, 0, 0, 0.08), 2px 2px 0px rgba(0, 0, 0, 0.10);
        }

        .user-info-small {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .user-name-small {
            font-size: 14px;
            font-family: 'Pixelify Sans', cursive;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .friend-item:nth-child(odd) .user-name-small {
            background: linear-gradient(180deg, #1E2939 0%, #1E2939 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .friend-item:nth-child(even) .user-name-small {
            background: linear-gradient(180deg, #1E2939 0%, #1E2939 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-level-small {
            font-size: 12px;
            font-family: 'Jersey 20', cursive;
            font-weight: 400;
            background: linear-gradient(180deg, #6A7282 0%, #6A7282 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-steps {
            text-align: right;
        }

        .steps-value {
            font-size: 16px;
            font-family: 'Pixelify Sans', cursive;
            font-weight: 700;
            display: block;
            background: linear-gradient(180deg, #364153 0%, #364153 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .steps-label {
            font-size: 12px;
            font-family: 'Jersey 20', cursive;
            font-weight: 400;
            display: block;
            background: linear-gradient(180deg, #6A7282 0%, #6A7282 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 好友操作按钮 */
        .friend-action {
            width: 39.99px;
            height: 39.99px;
            margin-left: 15.99px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0px 1px 4px rgba(0, 0, 0, 0.08), 2px 2px 0px rgba(0, 0, 0, 0.10);
        }

        .friend-action.gift {
            background: #F3F4F6;
        }

        .friend-action.message {
            background: #F3F4F6;
        }

        .friend-action:hover {
            transform: translateY(-2px);
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
        }

        /* 滚动条样式 */
        .friend-list::-webkit-scrollbar {
            width: 4px;
        }

        .friend-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 2px;
        }

        .friend-list::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 2px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                width: 100vw;
                height: 100vh;
            }
        }
        
        /* 添加Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Jersey+20&family=Jersey+25&family=Inter:wght@400&family=Pixelify+Sans:wght@400;500;700&display=swap');
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部标题 -->
        <div class="header">
            <div class="title-section">
                <div class="main-title">RANKING</div>
                <div class="back-btn" onclick="goBack()">
                    <img src="./assets/CodeBubbyAssets/298_6328/1.svg" alt="返回" width="49" height="55">
                </div>
            </div>
            <div class="ranking-badge">
                <img src="./assets/CodeBubbyAssets/298_6328/2.svg" alt="奖杯" width="24" height="24">
                <span class="ranking-text">NO.4</span>
            </div>
        </div>

        <!-- 用户信息卡片 -->
        <div class="user-card">
            <div class="user-info">
                <div class="user-avatar">
                    <img class="avatar-img" src="./assets/CodeBubbyAssets/298_6328/3.svg" alt="用户头像">
                    <div class="level-badge">⭐</div>
                </div>
                <div class="user-details">
                    <div class="user-name">EMMA <span class="you-tag">(YOU)</span></div>
                    <div class="user-level">LEVEL 12 Guardians</div>
                </div>
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-icon">👟</div>
                    <div class="stat-value">12,450</div>
                </div>
                <div class="ranking-stat">
                    <img class="ranking-stat-icon" src="./assets/CodeBubbyAssets/298_6328/4.svg" alt="排名">
                    <div class="stat-value">NO.4</div>
                </div>
            </div>
        </div>

        <!-- 标签切换 -->
        <div class="tabs">
            <div class="tab" onclick="switchTab('ranking')">
                <img src="./assets/CodeBubbyAssets/298_6328/5.svg" alt="排名" width="24" height="24">
                <span>RANKING LIST</span>
            </div>
            <div class="tab active" onclick="switchTab('friend')">
                <img src="./assets/CodeBubbyAssets/298_6328/6.svg" alt="好友" width="24" height="24">
                <span>FRIEND LIST</span>
            </div>
        </div>

        <!-- 好友列表 -->
        <div class="friend-list" id="friendList">
            <!-- 好友1 -->
            <div class="friend-item">
                <img class="user-avatar-small" src="./assets/CodeBubbyAssets/298_6328/7.svg" alt="LIMA">
                <div class="user-info-small">
                    <div class="user-name-small">LIMA</div>
                    <div class="user-level-small">LEVEL 11</div>
                </div>
                <div class="user-steps">
                    <span class="steps-value">9,800</span>
                    <span class="steps-label">Steps</span>
                </div>
                <div class="friend-action gift" onclick="sendGift('LIMA')">
                    <img src="./assets/CodeBubbyAssets/298_6328/8.svg" alt="礼物" width="24" height="24">
                </div>
            </div>

            <!-- 好友2 -->
            <div class="friend-item">
                <img class="user-avatar-small" src="./assets/CodeBubbyAssets/298_6328/9.svg" alt="JOHN">
                <div class="user-info-small">
                    <div class="user-name-small">JOHN</div>
                    <div class="user-level-small">LEVEL 12</div>
                </div>
                <div class="user-steps">
                    <span class="steps-value">9,800</span>
                    <span class="steps-label">Steps</span>
                </div>
                <div class="friend-action message" onclick="sendMessage('JOHN')">
                    <img src="./assets/CodeBubbyAssets/298_6328/10.svg" alt="消息" width="24" height="24">
                </div>
            </div>

            <!-- 好友3 -->
            <div class="friend-item">
                <img class="user-avatar-small" src="./assets/CodeBubbyAssets/298_6328/11.svg" alt="JOHN.W">
                <div class="user-info-small">
                    <div class="user-name-small">JOHN.W</div>
                    <div class="user-level-small">LEVEL 12</div>
                </div>
                <div class="user-steps">
                    <span class="steps-value">9,800</span>
                    <span class="steps-label">Steps</span>
                </div>
                <div class="friend-action message" onclick="sendMessage('JOHN.W')">
                    <img src="./assets/CodeBubbyAssets/298_6328/10.svg" alt="消息" width="24" height="24">
                </div>
            </div>

            <!-- 好友4 -->
            <div class="friend-item">
                <img class="user-avatar-small" src="./assets/CodeBubbyAssets/298_6328/12.svg" alt="HANS">
                <div class="user-info-small">
                    <div class="user-name-small">HANS</div>
                    <div class="user-level-small">LEVEL 11</div>
                </div>
                <div class="user-steps">
                    <span class="steps-value">11,200</span>
                    <span class="steps-label">Steps</span>
                </div>
                <div class="friend-action gift" onclick="sendGift('HANS')">
                    <img src="./assets/CodeBubbyAssets/298_6328/13.svg" alt="礼物" width="24" height="24">
                </div>
            </div>

            <!-- 好友5 -->
            <div class="friend-item">
                <img class="user-avatar-small" src="./assets/CodeBubbyAssets/298_6328/14.svg" alt="LION">
                <div class="user-info-small">
                    <div class="user-name-small">LION</div>
                    <div class="user-level-small">LEVEL 11</div>
                </div>
                <div class="user-steps">
                    <span class="steps-value">11,200</span>
                    <span class="steps-label">Steps</span>
                </div>
                <div class="friend-action gift" onclick="sendGift('LION')">
                    <img src="./assets/CodeBubbyAssets/298_6328/15.svg" alt="礼物" width="24" height="24">
                </div>
            </div>
        </div>
    </div>

    <script>
        // 返回第七页
        function goBack() {
            console.log('返回第七页');
            window.location.href = 'page7.html';
        }

        // 切换标签（这里只是模拟，实际会跳转）
        function switchTab(tabName) {
            if (tabName === 'ranking') {
                window.location.href = 'page7.html';
            }
            console.log('当前已在Friend List标签');
        }

        // 发送礼物
        function sendGift(friendName) {
            console.log('发送礼物给:', friendName);
            alert(`礼物已发送给 ${friendName}！`);
        }

        // 发送消息
        function sendMessage(friendName) {
            console.log('发送消息给:', friendName);
            alert(`消息已发送给 ${friendName}！`);
        }

        // 页面加载动画
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                container.style.transition = 'all 0.5s ease';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>
